<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="This is a sample test for Cognizant communicatioin drive.">
  <meta name="keywords" content="Cognizant, communication, sample test, practice test, communication drive">
  <meta name="author" content="Cognizant Communication Practice Test">
  <meta property="og:title" content="Section D">
  <meta property="og:description" content="This is a sample test for Cognizant communicatioin drive.">
  <meta property="og:type" content="website">
  <title>Section D</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Section D - Passage Listening</h1>
      <div class="test-info" style="display:flex;">
        <span id="counter">Passage 1 - Q1</span>
        <div class="timer" id="timer">Time: 00:00</div>
      </div>
    </header>

    <main>
      <div class="question-card">
        <p><a href="../" class="btn btn-secondary">Home</a></p>
        <div class="answer-feedback" style="display:block;">
          <p>Listen to the passage audio once and answer the questions.</p>
        </div>
        <div class="navigation-buttons">
          <button id="play-btn" class="btn btn-primary">Play Passage Audio</button>
        </div>

        <div class="question-header"><h3 id="question">Question</h3></div>

        <div class="options-container">
          <div class="option" data-option="0"><input type="radio" name="ans" id="o0" value="0"><label for="o0" id="l0">A</label></div>
          <div class="option" data-option="1"><input type="radio" name="ans" id="o1" value="1"><label for="o1" id="l1">B</label></div>
          <div class="option" data-option="2"><input type="radio" name="ans" id="o2" value="2"><label for="o2" id="l2">C</label></div>
          <div class="option" data-option="3"><input type="radio" name="ans" id="o3" value="3"><label for="o3" id="l3">D</label></div>
        </div>

        <div class="navigation-buttons">
          <button id="next-btn" class="btn btn-primary">Next</button>
          <button id="finish-btn" class="btn btn-success" style="display:none;">Finish</button>
        </div>
      </div>
    </main>
  </div>

  <script src="section-d.js"></script>
</body>
</html>
